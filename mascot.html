<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:;"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }
    #mascot-wrap {
      position: absolute;
      bottom: 0; left: 0; right: 0; top: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      cursor: pointer;
    }
    #mascot-wrap:hover #mascot-bubble { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    #mascot-img {
      width: 110px; height: auto; max-height: 170px;
      object-fit: contain;
      display: block;
      transition: transform 0.25s ease;
      animation: bob 0.55s ease-in-out infinite alternate;
    }
    #mascot-img.flip { transform: scaleX(-1); }
    #mascot-fallback { display: none; animation: bob 0.55s ease-in-out infinite alternate; }
    #mascot-fallback.flip { transform: scaleX(-1); }
    @keyframes bob {
      from { margin-bottom: 0px; }
      to   { margin-bottom: 8px; }
    }
    #mascot-bubble {
      position: absolute;
      bottom: 170px; left: 50%;
      transform: translateX(-50%) translateY(8px) scale(0.9);
      background: rgba(255,255,255,0.97);
      border: 1.5px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      padding: 6px 12px;
      font-size: 12px;
      font-family: 'Segoe UI', sans-serif;
      color: #1e293b;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      pointer-events: none;
    }
    #mascot-bubble::after {
      content: '';
      position: absolute;
      bottom: -7px; left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: rgba(255,255,255,0.97);
    }
    #mascot-close {
      position: absolute;
      top: 2px; right: 2px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: rgba(30,30,30,0.72);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.2);
      font-size: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
    }
    #mascot-wrap:hover #mascot-close { opacity: 1; }
    #mascot-close:hover { background: rgba(180,30,30,0.85); }
  </style>
</head>
<body>
  <div id="mascot-wrap">
    <button id="mascot-close" title="Masquer">&#x2715;</button>
    <div id="mascot-bubble">&#x1F44B; Salut !</div>
    <img id="mascot-img" src="assets/figurine.png" alt="mascot"
         onerror="this.style.display='none';document.getElementById('mascot-fallback').style.display='block'"/>
    <svg id="mascot-fallback" viewBox="0 0 80 110" width="80" height="110" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="40" cy="30" rx="22" ry="25" fill="#fcd5b0"/>
      <rect x="18" y="20" width="44" height="12" rx="6" fill="#1a1a2e"/>
      <rect x="22" y="50" width="36" height="40" rx="10" fill="#2c3e50"/>
      <rect x="12" y="52" width="12" height="30" rx="6" fill="#2c3e50"/>
      <rect x="56" y="52" width="12" height="30" rx="6" fill="#2c3e50"/>
      <rect x="24" y="88" width="12" height="22" rx="6" fill="#34495e"/>
      <rect x="44" y="88" width="12" height="22" rx="6" fill="#34495e"/>
      <ellipse cx="33" cy="33" rx="3" ry="3.5" fill="#3a3a5c"/>
      <ellipse cx="47" cy="33" rx="3" ry="3.5" fill="#3a3a5c"/>
    </svg>
  </div>
  <script>
    const BUBBLES = ['&#x1F44B; Salut !','&#x2615; Pause ?','&#x1F4AA; Au boulot !','&#x2728; Super !','&#x1F3B5; ...','&#x1F680; En route !'];
    const wrap    = document.getElementById('mascot-wrap');
    const bubble  = document.getElementById('mascot-bubble');
    const img     = document.getElementById('mascot-img');
    const fbk     = document.getElementById('mascot-fallback');
    const closeBtn= document.getElementById('mascot-close');

    closeBtn.addEventListener('click', (e) => { e.stopPropagation(); window.mascot.hide(); });
    wrap.addEventListener('dblclick', () => window.mascot.hide());
    wrap.addEventListener('mouseenter', () => {
      bubble.textContent = BUBBLES[Math.floor(Math.random() * BUBBLES.length)];
    });
    window.mascot.onDir((dir) => {
      const f = dir === -1;
      img.classList.toggle('flip', f);
      fbk.classList.toggle('flip', f);
    });
  </script>
</body>
</html>
